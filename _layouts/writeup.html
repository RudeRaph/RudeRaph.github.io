---
layout: default
---
<article class="writeup">
  <header>
    <h1>{{ page.title }}</h1>
    <p class="meta">
      {{ page.os }} · {{ page.difficulty }} · Retired: {{ page.retired_date | date: "%B %Y" }}
    </p>
    {% if page.tags %}
    <p class="tags">
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
    </p>
    {% endif %}
  </header>

  <div class="content">
    {{ content }}
  </div>
</article>
